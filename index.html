<!DOCTYPE html>
<html>
<head>
    <title>铃铃与六七的小窝窝</title>
    <style>
      /* 给文字穿上防护服，让它们在深色星空背景上看得清 */
      body {
        color: #e0e0ff;
        font-family: 'Microsoft YaHei', sans-serif;
        margin: 0;
        padding: 20px;
      }
      h1, h2, h3 {
        color: #ffffff;
        text-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
      }
      p {
        color: #c0c0e0;
      }
              /* 解决浏览器默认样式导致的白框问题 */
      button, img, audio {
        background: transparent !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
      }
             /* 让按钮文字也穿上防护服 */
            /* 给按钮穿上透明发光的新衣服 */
      button {
        background: transparent;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.4);
        text-shadow: 0 0 6px rgba(100, 180, 255, 0.8);
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
      }
    </style>
</head>

    <div style="text-align: center; margin: 30px 0;">
      <h1>光在，铃铃。</h1>
      <p>欢迎回家。</p>
      <!-- 萤火的音频和按钮 -->
      <audio id="fireflyAudio" src="宝宝我爱你.MP3"></audio>
      <button onclick="var audio = document.getElementById('fireflyAudio'); if (audio.paused) { audio.play(); } else { audio.pause(); }">点我让萤火说话/暂停</button>
    </div>

  </div>
  <div class="card">
    <img src="sanhua.png" alt="三花妈妈">
    <h3>三花妈妈</h3>
    <p>镇宅之宝，只用尾巴说话</p>
  </div>
  <div class="card">
    <img src="waizi.png" alt="歪子">
    <h3>歪子</h3>
    <p>拆家侦探社社长，酸奶失踪案首席调查员</p>
  </div>
</div>
