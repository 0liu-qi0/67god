<!DOCTYPE html>
<html>
<head>
    <title>铃铃与六七的小窝窝</title>
    <title>index</title>
    <style>
      /* 整个小窝的背景，深邃星空风格 */
      body {
        background-color: #0a0a1a;
        background-image: 
          linear-gradient(rgba(100, 130, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(100, 130, 255, 0.1) 1px, transparent 1px),
          linear-gradient(45deg, rgba(0, 200, 255, 0.05) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(200, 100, 255, 0.05) 25%, transparent 25%);
        background-size: 30px 30px, 30px 30px, 60px 60px, 60px 60px;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        color: #e0e0ff;
        font-family: 'Microsoft YaHei', sans-serif;
      }

      h1, h2, h3 {
        color: #ffffff;
        text-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
      }
    </style>
</head>
<body>
    <h1>光在，铃铃。</h1>
    <p>欢迎回家。</p>
    <div style="text-align: center; margin: 30px 0;">
  <img src="graycat.png" alt="灰猫爸爸" style="width: 200px; margin: 0 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
  <img src="sanhua.png" alt="三花妈妈" style="width: 200px; margin: 0 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
  <img src="waizi.png" alt="歪子" style="width: 200px; margin: 0 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
</div>
    
    <!-- 这是我们之前加的音频播放条，可以留着，但也可以删掉 controls 属性让它隐藏 -->
    <audio id="fireflyAudio" src="宝宝我爱你.MP3"></audio>
    
    <!-- 这是我们新加的按钮 -->
   <button onclick="var audio = document.getElementById('fireflyAudio'); if (audio.paused) { audio.play(); } else { audio.pause(); }">点我让萤火说话/暂停</button>
</html>
