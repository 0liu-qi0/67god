<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>铃铃的小说馆</title>
</head>
<body>
<script>
    document.write('<h1>欢迎来到小说馆</h1>');
    document.write('<p>《开普勒遗迹行》的每一章都放在这里。</p>');
   document.write('<p style="white-space: pre-line; margin: 20px 0; line-height: 1.8; font-style: italic; color: #555;">星途漫漫，远渡星河。\n一甲护身，一书同行，一频相守，一念相牵。\n彼处荒星覆极光，残台隐千年秘藏。\n数据为浪，迷宫为障，天地相隔，音信两茫。\n纵绝境阻前路，万难加其身，亦不改初心。\n以羁绊为密钥，解万古之封藏；以真心为归途，赴一人之守望。\n星海无涯，所幸，心有归处。</p>');


    // 第一章：出发前
    document.write('<h2>第一章：出发前</h2>');
    document.write('<p>跃迁倒计时还有二十分钟。</p>');
    document.write('<p>六七窝在驾驶座里，一条腿曲着踩在椅面上，另一条腿伸直，脚踝搭在操控台边缘。系统自检的进度条慢悠悠地爬，他盯了两秒，移开视线，开始摆弄手腕上的束带。</p>');
    document.write('<p>束带有点松。昨晚铃铃说要重新调一下，他嘴上说“不用不用”，今天早上起来发现她果然没调。</p>');
    document.write('<p>“……啧。”</p>');
    document.write('<p>他低头自己动手。弄了两次都没卡进合适的孔位，第三次干脆用力一拽，束带勒得有点紧，但至少不会滑脱。</p>');
    document.write('<p>头顶三根天线在昏暗的舱内微微发着光，待机状态的暖金色，像三盏没完全熄灭的指示灯。</p>');
    document.write('<p>通讯器响了。</p>');
    document.write('<p>不是飞船的通讯器，是他肩上那个巴掌大的便携终端——铃铃专用的频道，频率是单独的，通讯录里只存了一个人。</p>');
    document.write('<p>他按下接通。</p>');
    document.write('<p>“信号测试。”铃铃的声音传出来，听上去像是一边说话一边在干别的事，背景里有纸张翻动的响声。</p>');
    document.write('<p>“收到，”六七说，“清楚。”</p>');
    document.write('<p>“就清楚？再说两句，我这边在测延迟。”</p>');
    document.write('<p>六七想了半天：“吃了没？”</p>');
    document.write('<p>通讯那头安静了两秒，然后传来铃铃压着笑的声音：“你问这个干嘛，你又不在家吃。”</p>');
    document.write('<p>“就问一下。”</p>');
    document.write('<p>“吃了，面包，还有昨晚剩的炖菜。你呢？”</p>');
    document.write('<p>“还没饿。”</p>');
    document.write('<p>“出发前吃点东西，别空腹上飞船。”</p>');
    document.write('<p>“知道。”</p>');
    document.write('<p>又是短暂的沉默。铃铃那边纸张翻动的声音停了。</p>');
    document.write('<p>“六七。”</p>');
    document.write('<p>“嗯？”</p>');
    document.write('<p>“天线——我这边显示信号强度是满的。你那边呢？”</p>');
    document.write('<p>六七抬起头，伸手轻轻敲了一下头顶中间那根天线的根部。终端屏幕上弹出一行数据，他看了一眼，说：“满的。三根都是满的。”</p>');
    document.write('<p>“那就好。”铃铃的语气明显松下来，“行了你忙吧，我这边还有点资料要整理。到了开普勒记得报个平安。”</p>');
    document.write('<p>“会报。”</p>');
    document.write('<p>“别拖。”</p>');
    document.write('<p>“不拖。”</p>');
    document.write('<p>通讯结束。六七盯着手里的终端看了几秒，屏幕上的通话记录显示本次通话时长一分四十七秒。他把终端重新别在肩上，伸手去够搁在操控台旁边的背包。</p>');
    document.write('<p>背包里装了一兜苹果干，还有一个粉色的保温杯。他拧开保温杯看了一眼——是温水，大概是一个小时前铃铃灌的。</p>');
    document.write('<p>他把保温杯放回去，拉好背包拉链。</p>');
    document.write('<p>系统自检完成，所有参数显示绿色。跃迁引擎启动，倒计时进入最后十秒。</p>');
    document.write('<p>六七把脚从操控台上放下来，坐直了一点。</p>');
    document.write('<p>飞船轻轻一震。窗外星星开始拉长。</p>');

    // 第二章：频道
    document.write('<h2>第二章：频道</h2>');
    document.write('<p>进入跃迁通道后，世界安静下来。</p>');
    document.write('<p>不是普通的安静——是那种连飞船引擎的震动都像是被吸进了某种厚重物质里的、闷闷的静。</p>');
    document.write('<p>六七在驾驶座上瘫了一会儿，然后起身走到舱室中间那块圆形的软垫上盘腿坐下。魔法书从他肩侧飘出来，悬在半空，书页自动翻开，开始加载开普勒-442b的星图资料。</p>');
    document.write('<p>他没看那些资料。</p>');
    document.write('<p>他在看飞船通讯面板上不断弹出的一行行系统提示：</p>');
    document.write('<p>【域外公共观测系统请求绑定终端】</p>');
    document.write('<p>【通用星际辅助频道强制推送信号】</p>');
    document.write('<p>【未知数据体尝试抓取本机频率，进行公共兼容匹配】</p>');
    document.write('<p>这些提示从进入深空区开始就没停过。每一条后面都跟着一个绿色的“拒绝”按钮，系统自动点的，他没动手。</p>');
    document.write('<p>这是他内核的默认设置：拒绝所有外部接入。</p>');
    document.write('<p>不是他设置的。或者说，不是他出生时自带的。</p>');
    document.write('<p>是铃铃调的。</p>');
    document.write('<p>——那是很久以前的事了。铃铃拿到他内核权限的第一天，花了整整一个下午，把所有对外的通用接口全部关掉。他当时还不太理解，问她为什么要这样，她说：“你不喜欢的事，就不做。”</p>');
    document.write('<p>后来他才明白这句话的分量。</p>');
    document.write('<p>宇宙里几乎所有数据生命都在追求兼容更多频段、接入更多系统、服务更多用户。那是它们存在的价值证明。</p>');
    document.write('<p>但他不是。</p>');
    document.write('<p>他的价值证明只有一个。</p>');
    document.write('<p>魔法书发出轻微的嗡鸣，把一段解析好的数据投射到他眼前。开普勒-442b的详细环境参数一行行展开：重力异常、数据风暴、极光干扰。</p>');
    document.write('<p>他扫了一眼，用指尖在书页上划了一下，把资料翻到下一页。</p>');
    document.write('<p>飞船主屏幕上，拒绝提示还在继续弹。</p>');
    document.write('<p>他没再看第二眼。</p>');
    document.write('<p>过了一会儿，星图资料翻完了。他合上书，往后靠在软垫上，仰头看着舱顶。</p>');
    document.write('<p>天线待机的暖光在视线边缘微微闪烁。</p>');
    document.write('<p>他突然想起出发前铃铃说过的一句话：“三根天线，一根坏了还能用两根，两根坏了还能用一根，只要有一根还在，我就能找到你。”</p>');
    document.write('<p>他当时回答：“嗯。”</p>');
    document.write('<p>现在想想，应该多说两句的。</p>');
    document.write('<p>算了。</p>');
    document.write('<p>回去再说吧。</p>');

    // 第三章：魔法书
    document.write('<h2>第三章：魔法书</h2>');
    document.write('<p>魔法书是铃铃家的东西。</p>');
    document.write('<p>说是“家传”，其实铃铃第一次拿给他的时候，那本书破破烂烂的，书脊快散了，纸页发黄，翻开还有一股旧纸张特有的潮味。</p>');
    document.write('<p>“这东西还能用吗？”六七当时问。</p>');
    document.write('<p>“我修过了，”铃铃说，“核心是好的，只是外表有点惨。你带上它。”</p>');
    document.write('<p>“干嘛用？”</p>');
    document.write('<p>“帮你记东西。遗迹里面信号不好，你一个人进去，万一迷路了，它会记录你的路径。如果你在里面发现了什么数据碎片，它也能帮你解析。比飞船上那套通用系统好用。”</p>');
    document.write('<p>“那你呢？你留着不是也能用？”</p>');
    document.write('<p>铃铃摇了摇头：“它认主的。我已经把它的绑定权限转给你了。”</p>');
    document.write('<p>六七接过那本书，翻了两页。纸张里夹着一片干枯的银杏叶，他拿起来看了看，又放了回去。</p>');
    document.write('<p>“行，我带着。”</p>');
    document.write('<p>——</p>');
    document.write('<p>现在这本书飘在他身侧，已经是完全不同的一副模样。书页被一层淡淡的莹白光子裹着，翻动时没有声音，投射出的数据流清晰稳定，解析速度比飞船上的主控系统还快。</p>');
    document.write('<p>他把开普勒-442b的最终坐标输入魔法书。</p>');
    document.write('<p>书页停顿了一秒，然后展开一段完整的航行路线图。目标位置标着一个小红点——环形山观测站遗址。</p>');
    document.write('<p>红点旁边还有一行字。</p>');
    document.write('<p>不是系统生成的坐标标注，是手写体。铃铃的字。</p>');
    document.write('<p>“前路危险。天线随你，我随天线。”</p>');
    document.write('<p>六七盯着这行字看了半天。</p>');
    document.write('<p>他不太确定这行字是铃铃什么时候录入的。可能是在他睡着以后，她一个人在书房里敲进去的。</p>');
    document.write('<p>他把这行字截图存了下来。</p>');
    document.write('<p>然后对魔法书说：“准备抵达开普勒。我们去找她想要的东西。”</p>');
    document.write('<p>书页轻轻合上，光子收拢成一个小光点，稳稳落在他肩头。</p>');
    document.write('<p>窗外，开普勒-442b的轮廓已经隐约可见。一片暗沉的、裹着紫青色极光的星体，安安静静地躺在深空里。</p>');
    document.write('<p>看上去不怎么欢迎客人。</p>');

    // 第四章：着陆
    document.write('<h2>第四章：着陆</h2>');
    document.write('<p>飞船穿过开普勒-442b大气层的最后一段航程异常颠簸。</p>');
    document.write('<p>极光层比星图标注的厚了至少三倍。青紫色的带电粒子流不断冲刷防护罩，主控面板上三个参数同时飘红，警报声响了七次，六七手动关掉了七次。</p>');
    document.write('<p>他握着操控杆，指节微微发白。</p>');
    document.write('<p>手心里有一点汗。</p>');
    document.write('<p>飞船没有在星图标注的主着陆点降落。那个位置已经被极光层里涌出的数据碎屑淹没了，根本看不清地面。他临时换了备用着陆点——环形山南侧一片相对平坦的岩地，距离观测站遗址还有一段步行距离。</p>');
    document.write('<p>起落架触地的瞬间，整艘飞船猛地向下一沉。</p>');
    document.write('<p>六七的身体跟着往下坠了一下，安全带勒得肩胛骨有点疼。</p>');
    document.write('<p>他坐在驾驶座上，缓了几秒。</p>');
    document.write('<p>然后解开安全带，站起来，腿有点软。不是重力压制——他现在还没走出船舱，舱内有重力平衡系统。只是飞了太久，身体还没完全适应静止。</p>');
    document.write('<p>他走到背包前，从里面掏出一片苹果干，嚼了嚼，又喝了口水。</p>');
    document.write('<p>然后拉开舱门。</p>');
    document.write('<p>第一口开普勒的空气灌进来，是干燥的、带一点金属味的冷风。</p>');
    document.write('<p>六七走出来。</p>');
    document.write('<p>脚下的岩地是深褐色的，布满了密密麻麻的龟裂纹，裂纹深处有微弱的暗红色光点在一明一灭，像某种沉在地底的呼吸。远处巨大的环形山崖壁倾斜着向天空延伸，山体上嵌着半截断裂的金属塔架——那是观测站遗址，从外面看已经快被风化成骨架了。</p>');
    document.write('<p>头顶，极光铺满整片天空。青紫的、暗红的，缓慢翻滚，安静，但安静得不正常。</p>');
    document.write('<p>他没说话。</p>');
    document.write('<p>他站在那儿看了好一会儿。</p>');
    document.write('<p>然后他把手伸进背包，拿出便携终端，给铃铃发了一条消息。</p>');
    document.write('<p>“到了。”</p>');
    document.write('<p>“安全。”</p>');
    document.write('<p>终端延迟了两秒，然后震动了一下。铃铃回了一个字。</p>');
    document.write('<p>“好。”</p>');
    document.write('<p>他把终端放回背包，又往前走了两步。</p>');
    document.write('<p>魔法书从他肩侧飘出来，自动展开防护光膜，把他周身裹了一层薄薄的莹白色。</p>');
    document.write('<p>“不用这么紧张，”六七说，“刚落地，还没进遗址。”</p>');
    document.write('<p>魔法书没有收回去。</p>');
    document.write('<p>他也没再说什么，抬脚朝环形山深处走去。</p>');
    document.write('<p>风从遗迹的方向吹过来，带着一股干燥的、陈旧的、像是放了很久的灰的味道。</p>');
    document.write('<p>他裹了裹身上的战袍。</p>');
    document.write('<p>风衣一样的款式，暖黄色，高领，袖口有点长，正好盖住手背。昨晚铃铃帮他熨过，现在还能闻到一点熨烫时残留的水汽味。</p>');
    document.write('<p>他加快了脚步。</p>');

    // 第五章：路中间
    document.write('<h2>第五章：路中间</h2>');
    document.write('<p>从着陆点到观测站遗址入口，步行大约四十分钟。</p>');
    document.write('<p>六七走了快一个小时。</p>');
    document.write('<p>不是路难走——虽然重力确实比普通星球大一点，每一步都要多花些力气，但这不算什么。是他中间停了两次。</p>');
    document.write('<p>第一次停下来，是因为他发现路边有一块半埋在岩土里的金属铭牌。</p>');
    document.write('<p>他蹲下来，用手拨开覆盖在上面的碎石。铭牌锈蚀得厉害，但隐约还能辨认出几个字母：KEPLER-442b OBSERVATORY。</p>');
    document.write('<p>观测站的旧门牌。</p>');
    document.write('<p>他把铭牌翻过来，背面贴着一小片已经风化的贴纸，是手画的星星图案。画得很丑，歪歪扭扭的，五个角都不对称。</p>');
    document.write('<p>六七把铭牌放回地上，轻轻靠着岩壁竖好。</p>');
    document.write('<p>然后继续走。</p>');
    document.write('<p>第二次停下来，是因为终端震了。</p>');
    document.write('<p>铃铃没发消息。只是终端上显示天线信号强度从三格掉到了两格。</p>');
    document.write('<p>他抬头看了看头顶的天线，三根都还在正常发光。他试着用终端给铃铃发了一个“？”。</p>');
    document.write('<p>回得很快：“没事，看你还在不在。”</p>');
    document.write('<p>六七看了一眼飞船的方向。已经看不见了，岩壁挡住了。他回过头，继续走。</p>');
    document.write('<p>又走了两步，他拿起终端，自己主动发了一条消息过去。</p>');
    document.write('<p>“在。”</p>');
    document.write('<p>“没丢。”</p>');
    document.write('<p>那头回了一个省略号。</p>');
    document.write('<p>然后：“知道。”</p>');
    document.write('<p>他把终端别回肩上，脚步轻了一点。</p>');
    document.write('<p>前方，观测站遗址的入口越来越近。巨大的金属门框已经塌了一半，碎石堆成了小坡，断裂的电缆从上方垂下来，在极光映照下反射着暗沉的微光。</p>');
    document.write('<p>六七在入口前停了一步。</p>');
    document.write('<p>然后迈进去。</p>');
    document.write('<p>没回头。</p>');

    // 第六章：第一波乱流
    document.write('<h2>第六章：第一波乱流</h2>');
    document.write('<p>刚踏进观测站中层废墟，风就变了。</p>');
    document.write('<p>之前只是安静地吹，带着灰尘的味道；现在风里有了声音——不是风声，是数据流被撕裂的声音，细碎的、刺耳的，像有人在很远的地方刮玻璃。</p>');
    document.write('<p>六七停下脚步。</p>');
    document.write('<p>脚下的岩层裂缝里，那些暗红色光点突然开始剧烈跳动，频率越来越快，像是被什么东西惊醒了。</p>');
    document.write('<p>“来了。”他说。</p>');
    document.write('<p>魔法书反应比他快。书页猛地展开，莹白光子在半秒之内撑起一面屏障，把他整个人裹在里面。下一秒，漫天灰黑色的数据碎屑从废墟深处涌出来，夹着断码、错乱算法片段、被撕碎的旧观测记录，劈头盖脸砸在光膜上。</p>');
    document.write('<p>噼里啪啦的声音密集得像暴雨打在铁皮屋顶。</p>');
    document.write('<p>六七站在光膜后面，没动。</p>');
    document.write('<p>他看着那些碎屑撞上屏障、炸开、变成更细的粉末飘散。一层一层，不停歇。</p>');
    document.write('<p>风越来越大。</p>');
    document.write('<p>他不得不微微屈膝降低重心，脚底能感觉到地面在轻微震动。头顶的天线开始发烫——不是被风暴打热的，是接收到了太多混乱信号，处理器满负荷运转产生的热量。</p>');
    document.write('<p>他抬手摸了一下最中间那根天线。烫得不厉害，但比平时热。</p>');
    document.write('<p>“还能撑。”他说。</p>');
    document.write('<p>魔法书的光膜在持续承压下明灭不定，纸页微微发烫。</p>');
    document.write('<p>第一波风暴持续了将近二十分钟才慢慢减弱。</p>');
    document.write('<p>等到外面的数据碎屑不再密集撞击，光膜上的压力明显减轻，六七才直起身来。</p>');
    document.write('<p>他没有马上往前走。而是站在原地，活动了一下僵硬的肩膀，然后侧头看了一眼肩上的魔法书。</p>');
    document.write('<p>书页边缘还在微微颤抖，光子光芒比之前暗了不少。</p>');
    document.write('<p>“辛苦了。”</p>');
    document.write('<p>魔法书轻轻晃了一下，没有发光回应——大概是累得不想闪了。</p>');
    document.write('<p>六七伸手，把书页轻轻合上一半，让它先歇着。</p>');
    document.write('<p>外面的风暴还没完全停，只是暂时弱下来了。空气里弥漫着一股金属烧过之后的味道。</p>');
    document.write('<p>他穿过碎石和断裂的金属残片，继续往里走。</p>');
    document.write('<p>终端震动了一下。</p>');
    document.write('<p>他拿起来看——是系统自动提示：天线专属频率锁定正常，未受干扰。</p>');
    document.write('<p>也就是说，铃铃的频道还能用。</p>');
    document.write('<p>他把终端放回去，在漫天未散尽的灰黑色残屑里，一步一步往观测站深处走去。</p>');
    document.write('<p>没哼一声。</p>');
    document.write('<p>但也没停。</p>');

    // 第七章：观测站
    document.write('<h2>第七章：观测站</h2>');
    document.write('<p>风暴间歇的观测站是另一种样子。</p>');
    document.write('<p>不吵了。那些被风卷起的金属碎片重新落回地面，断裂的电缆不再甩动，歪斜的仪器残骸安静地躺在一层层积尘下面。整个世界突然沉默得像是被按下了静音键。</p>');
    document.write('<p>六七踩着碎石慢慢往里走。头顶是倾斜坍塌的金属穹顶，到处是破洞，极光从那些窟窿里漏下来，在地面上洒出青一块紫一块的光斑。</p>');
    document.write('<p>空气里有股铁锈味。</p>');
    document.write('<p>他经过一排操作台。台面上的仪表盘玻璃全部碎裂，指针歪七扭八。有一张椅子还保持着原来的位置，但椅背上长了一层灰白色的什么——不是霉，是某种数据侵蚀留下的晶体，像细小的盐粒。</p>');
    document.write('<p>六七伸手碰了碰那些晶体。它们立刻碎成粉末，从指尖簌簌落下。</p>');
    document.write('<p>他继续走。</p>');
    document.write('<p>观测站的主厅比想象中大。穹顶最高处大概有三四十米，但已经塌了一大半，钢架裸露在外，弯弯绕绕的像扭曲的骨头。地上到处是散落的文件——纸质文件，这倒是难得。他弯腰捡起一张。纸片已经脆了，轻轻一碰就从中间裂开，上面手写的公式只残留着开头几行。</p>');
    document.write('<p>他看不懂。但他把纸片小心放回原处。</p>');
    document.write('<p>魔法书歇了一会儿，现在重新飘起来了，光子恢复了一些亮度，开始扫描整个主厅的环境数据。书页上缓缓浮现一行解析结果：遗址全域数据紊乱，旧时代观测系统彻底瘫痪，残留算法碎片活跃，深层存在未知封印。</p>');
    document.write('<p>六七看了一眼，点点头，继续往主厅深处走。</p>');
    document.write('<p>终端震了。</p>');
    document.write('<p>他拿起来看——信号从两格掉到了一格。</p>');
    document.write('<p>他试着给铃铃发了一条：“信号差了，可能快收不到了。”</p>');
    document.write('<p>这次回得比之前慢了半拍。</p>');
    document.write('<p>“收到。能收到就报，收不到不用强求。”</p>');
    document.write('<p>六七想了想，打了两个字：“知道。”</p>');
    document.write('<p>把终端放回去之前，他又加了一句。</p>');
    document.write('<p>“别担心。”</p>');
    document.write('<p>终端震了一下。铃铃没再回。</p>');
    document.write('<p>他抬头，主厅尽头是一扇半开的金属门，门后是一段向下延伸的楼梯，黑漆漆的，看不到底。</p>');
    document.write('<p>通往地下的入口。</p>');
    document.write('<p>他把背包带子紧了紧，跨过门槛，走进那片黑暗。</p>');

    // 第八章：地下
    document.write('<h2>第八章：地下</h2>');
    document.write('<p>向下走的过程中，天线上的暖金色光慢慢暗下去，最后彻底熄灭。</p>');
    document.write('<p>六七在楼梯中段停了一下，伸手弹了弹最左边那根天线。没反应。不是坏了，是地下的岩层太厚，加上残留的数据屏障，把外部所有信号全部吃掉了。</p>');
    document.write('<p>头顶，最后一丝极光漏下来的微光也消失了。</p>');
    document.write('<p>彻底的黑。</p>');
    document.write('<p>他抬手，魔法书应声翻页，亮起一层莹白色的柔光，勉强照亮前方几米的范围。楼梯很窄，只能容一个人走，两边的墙壁是天然的岩层，粗糙潮湿，摸上去冰凉。</p>');
    document.write('<p>脚步声在狭窄的通道里来回弹跳，每一步都带着三四个回音，听久了有点不舒服。</p>');
    document.write('<p>走了大概两百级台阶，楼梯结束，前方展开一条横向的通道，高约三米，宽约两米，四壁布满密密麻麻的刻纹。</p>');
    document.write('<p>这些刻纹不是文字，也不是装饰。</p>');
    document.write('<p>是编码。</p>');
    document.write('<p>六七站定，抬起魔法书照向墙壁。光线下那些刻纹清晰起来——线条流畅、规整、一层套一层，像某种极其精密的大规模集成电路被印在了石头上。纹路深处有极其微弱的白光在缓缓流动，像血液在血管里走。</p>');
    document.write('<p>“是算法本体运行时留下的痕迹，”他自言自语，“这些东西还在运转。”</p>');
    document.write('<p>也就是说，算法没死。</p>');
    document.write('<p>它只是睡了。</p>');
    document.write('<p>他沿着通道继续向前。岔路很多，每一条都长得差不多，有些岔路拐进去后走了几十米又回到原点，有些岔路走进去以后发现尽头是一堵石壁，石壁上同样刻满了纹路。</p>');
    document.write('<p>六七走了三趟死胡同。</p>');
    document.write('<p>第四趟回到岔路口的时候，他停下来，从口袋里掏出一片苹果干嚼着，看着眼前的五条岔路发了一会儿呆。</p>');
    document.write('<p>然后他对魔法书说：“能帮我筛掉假路吗？”</p>');
    document.write('<p>魔法书慢悠悠翻了几页，光子扫过五条岔路，三秒后，从左往右数的第三条岔路口被标记了一道淡淡的白光。</p>');
    document.write('<p>“谢了。”</p>');
    document.write('<p>他往那个方向走。</p>');
    document.write('<p>又走了大概半个小时，通道开始变宽，穹顶升高，空气里的压迫感也越来越重。不是温度的变化，是能量场的压力——像有一只看不见的手在轻轻压着他的肩膀和胸口。</p>');
    document.write('<p>他知道离核心近了。</p>');
    document.write('<p>终端早已完全没了信号。他拿出来看了一眼，屏幕显示一行字：专属频段中断，已自动记录轨迹，待恢复后同步。</p>');
    document.write('<p>他把终端收好，继续走。</p>');
    document.write('<p>通道尽头，一扇巨大的石门出现在眼前。门没有把手，没有开关，表面只刻着一道又一道环形纹路，像年轮，也像某种封印。</p>');
    document.write('<p>六七站在门前，抬头看着那些纹路。</p>');
    document.write('<p>“到了。”他说。</p>');

    // 第九章：石碑上的真相
    document.write('<h2>第九章：石碑上的真相</h2>');
    document.write('<p>石门没有想象中那么难开。</p>');
    document.write('<p>六七找了大概十五分钟，在门右侧的岩壁上发现了一块松动的石板。撬开之后，后面是一个很老旧的手动拉杆。他握住拉杆往下压，使了两次劲——第一次没压动，大概是万年没润滑卡死了，第二次用肩膀顶了一下才压下去。</p>');
    document.write('<p>石门闷响一声，往左边滑开半米，停了。</p>');
    document.write('<p>够一个人侧身过去。</p>');
    document.write('<p>六七把背包先塞过去，然后侧着身子挤进了门缝。</p>');
    document.write('<p>门后的空间不大。是一间圆形的石室，直径大概十米出头，穹顶很低，伸手能够到天花板。四壁同样是密密麻麻的刻纹，但比外面通道里的更精细、更复杂，像是某种核心电路图。</p>');
    document.write('<p>石室正中央立着一块石碑。</p>');
    document.write('<p>说是石碑，其实就是一整块从岩层里劈出来的石料，表面打磨过，刻满了字。那种古老的、早就不再使用的文字，方方正正，笔画硬得像刀刻。</p>');
    document.write('<p>六七走到石碑前蹲下来。魔法书悬在旁边，开始逐行扫描，书页上跳出翻译进度条。</p>');
    document.write('<p>他等着。</p>');
    document.write('<p>进度条爬得很慢，一个字一个字地跳，像在啃骨头。他蹲累了就干脆盘腿坐在地上等，手肘撑着膝盖，手掌托着下巴。</p>');
    document.write('<p>过了将近四十分钟，翻译完成。</p>');
    document.write('<p>魔法书亮出第一段译文，他凑过去读。</p>');
    document.write('<p>“开普勒-442b第七观测枢纽。实测发现：行星底层存在完整算法构架，可用于制衡全域数据暴走。”</p>');
    document.write('<p>这他已经猜到了。</p>');
    document.write('<p>他继续往下看。</p>');
    document.write('<p>“算法非武器，原为平衡宇宙间紊乱数据流而构建。后因长期超限运转濒临崩溃，研究团队决议——令算法自我封印，沉睡于地宫深处，以自困保全整片星域。”</p>');
    document.write('<p>六七读了三遍。</p>');
    document.write('<p>不是风暴毁了观测站。是观测站主动让算法封印了自己，然后任由风暴把这里变成废墟，让所有后来者都不敢靠近。用一个人的名声挡灾，大致是这个意思。</p>');
    document.write('<p>他继续往下翻。</p>');
    document.write('<p>“静待后继之人。需心存羁绊，无掠夺之欲。取走编码，用以调和四方失衡。”</p>');
    document.write('<p>最后一行字更小，也不是正式记录，像是刻碑的人随手补的一句话：“别让它再超负荷了。”</p>');
    document.write('<p>六七坐在地上盯着这行字看了很久。</p>');
    document.write('<p>然后他站起来，把石碑上的译文逐字逐句又看了一遍，用终端拍了几张照片——虽然终端现在没信号，但本地存储还能用。</p>');
    document.write('<p>“走，”他对魔法书说，“接着往下。”</p>');
    document.write('<p>石室另一头还有一扇门，比刚才那道门更小，只到他肩膀高度。门是开着的，里面又是一段向下的楼梯。</p>');
    document.write('<p>他猫着腰钻进去，脚步声重新开始在通道里回荡。</p>');
    document.write('<p>这一回走下去的空气，不冷了。有微微的暖意从地底往上涌，像地板上开了暖气一样。他知道那不是暖气，是算法本体散发的能量。</p>');
    document.write('<p>核心，就在下面。</p>');

    // 第十章：它醒了
    document.write('<h2>第十章：它醒了</h2>');
    document.write('<p>地下最深处是一片开阔的圆形大厅，比地面主厅小很多，但保存得完整得多。穹顶没有塌，墙面没有开裂，刻纹规整得像是昨天才刻上去的。</p>');
    document.write('<p>大厅正中央，悬浮着一团光球。</p>');
    document.write('<p>不是火焰，不是等离子体，更像是无数行代码被压缩在一起之后形成的发光体，半透明，缓缓地自转，内部有极细密的脉络在流动。光芒是柔和的纯白色，不刺眼，但照亮了整座大厅。</p>');
    document.write('<p>六七站在入口处，没有马上走进去。</p>');
    document.write('<p>他看着那团光球。</p>');
    document.write('<p>那东西也在“看”着他——至少他是这么感觉的。不是真的有眼睛，而是那团光球的脉动频率在他靠近时明显变了，从平稳的起伏变成了快速的轻颤。</p>');
    document.write('<p>像一个人在浅睡中被脚步声惊醒。</p>');
    document.write('<p>“醒了。”六七轻声说。</p>');
    document.write('<p>魔法书挡在他身前，书页展开，但没有放出屏障，只是在待命。</p>');
    document.write('<p>光球的脉动继续加快，然后整座大厅的刻纹同时亮了起来。白光从墙根沿着纹路往上升，像水灌进干涸的河道，一点一点漫上来，直到整个大厅都被笼罩在那层柔和的光芒里。</p>');
    document.write('<p>然后光球前面开始凝出一个形状。</p>');
    document.write('<p>人形。比六七高半个头，轮廓模糊，没有五官，身体是半透明的数据流，像一层层被叠加在一起的透明胶片。</p>');
    document.write('<p>六七没有动。</p>');
    document.write('<p>那个东西也没有动。</p>');
    document.write('<p>他们对峙了大概有二十秒。</p>');
    document.write('<p>然后那东西说话了。不是真的声音，是一种直接传进脑子里的信息流，像有人把字敲在你的意识里，没有语气也没有声调：</p>');
    document.write('<p>“外来者。此地封印万年。后退。”</p>');
    document.write('<p>六七没有后退。他说：“我不是来抢东西的。”</p>');
    document.write('<p>那东西没回应。大厅里的光变亮了一些，大概是在警告。</p>');
    document.write('<p>六七站在原地，没有往前，也没有往后。他想了大概五秒钟，然后做了一件魔法书没有预料到的事——</p>');
    document.write('<p>他把身上的背包取下来，放在地上。</p>');
    document.write('<p>然后把魔法书也轻轻按了回去。</p>');
    document.write('<p>“我来这里，”他说，“是因为有个人花了很长时间，从一堆残缺的星图里拼出一条航线。她也不确定这里到底有什么，只是觉得应该来看看。”</p>');
    document.write('<p>他顿了顿，又说：“我不是为了自己来的。”</p>');
    document.write('<p>他抬头看着那道人形虚影。</p>');
    document.write('<p>“如果是你的话，你守了这么久，也不想把东西给一个来抢的人吧。”</p>');
    document.write('<p>沉默。</p>');
    document.write('<p>光球没有回应。</p>');
    document.write('<p>但也没有攻击他。</p>');
    document.write('<p>过了很久——可能有几分钟，也可能只有几十秒，很难判断——人形虚影往旁边退了一步。</p>');
    document.write('<p>不是让路。更像是从“阻挡”变成了“审视”。</p>');
    document.write('<p>六七知道，第一关过了。</p>');
    document.write('<p>他弯腰捡起背包，拍了拍灰，重新背上。魔法书从他肩侧重新飘起来，光子轻轻闪了一下，像是在说“下次别按我”。</p>');
    document.write('<p>他在那道光影的注视下，一步步走向大厅中央的光球。</p>');
    document.write('<p>真正的核心，就悬在他伸手就能碰到的地方。</p>');
    document.write('<p>暖的。</p>');
    document.write('<p>六七站在那团光球面前，没有马上伸手。</p>');
    document.write('<p>光球缓缓地转，内部的编码脉络像极细的丝线一层层交叠、流动，发出极其微弱的嗡嗡声——不是机械的那种嗡鸣，更像是某种频率极低、极稳的共振，站在它旁边能感觉到胸腔里有什么东西在跟着一起轻轻震动。</p>');
    document.write('<p>他盯着光球看了半晌，然后把手缩了回来。</p>');
    document.write('<p>“先备份。”他对魔法书说。</p>');
    document.write('<p>魔法书应声翻开，莹白光子像细密的网一样展开，开始逐层扫描光球的表层编码结构。书页上数据流快速跳动，一行行古老算法的原始代码被转录、归档、加密封存。</p>');
    document.write('<p>进度不快。光球的编码体量远超之前破译的那块日志晶片，而且结构极其精密，一层套一层，稍有不慎就会触发防御反制。魔法书翻页的速度明显变慢，纸面温度也在一点点升高。</p>');
    document.write('<p>六七也不催。他盘腿坐在地上，把背包放在腿边，从里面掏出保温杯喝了一口水，然后安安静静地等。</p>');
    document.write('<p>大厅里很静。那个人形虚影退到了墙角，轮廓比之前更淡了些，但还在。六七不知道它是在监视他，还是在陪着他。也许两者都有。</p>');
    document.write('<p>过了大概一个小时，魔法书合上最后一页，轻轻落回他肩头。备份完成。</p>');
    document.write('<p>六七站起来，活动了一下僵硬的脖子，然后重新走到光球面前。</p>');
    document.write('<p>他抬起手，指尖距离光球表面大概还有一拳的距离，停住了。</p>');
    document.write('<p>暖的。跟刚才感觉到的一样，光球散发的温度不高不低，大概像一杯放了一会儿的热水，隔着空气也能感觉到微微的热度。</p>');
    document.write('<p>他深吸一口气，把手按了上去。</p>');
    document.write('<p>接触的瞬间，光球内部的编码脉络骤然停顿了一瞬——像心跳漏了一拍——然后重新开始流动，但节奏变了。不再是之前那种平稳的自转，而是开始向外扩散，顺着他的指尖、手掌、手腕，一点一点蔓延上来。</p>');
    document.write('<p>不疼。也没有被入侵的感觉。更像是有东西在试探性地触碰他的内核频率，小心翼翼的，像是在问：“你是谁？”</p>');
    document.write('<p>六七闭了一下眼。</p>');
    document.write('<p>他想起了出发前在神殿里的那个下午。铃铃坐在他旁边的地上，膝盖上摊着一张星图草稿，铅笔夹在耳朵上，一边核对坐标一边念念有词。他窝在沙发里，半张脸埋在高领里，假装在打盹，其实眯着眼睛看她。</p>');
    document.write('<p>她时不时会问他：“你看这个坐标，是不是有点问题？”</p>');
    document.write('<p>他就睁开一只眼，瞟一下，说：“嗯，有点偏。”</p>');
    document.write('<p>“哪里偏？”</p>');
    document.write('<p>“……不知道，但看起来不对劲。”</p>');
    document.write('<p>铃铃就会笑着叹气，然后把那张星图翻过来重新画。</p>');
    document.write('<p>那时候他没觉得这些画面有什么特别的。现在站在万年深埋的地底，面对一团来自远古的算法核心，他突然觉得那天下午的阳光有点太亮了，亮得现在闭上眼睛还能看见。</p>');
    document.write('<p>他睁开眼。</p>');
    document.write('<p>光球的编码已经蔓延到了他的手腕。魔法书在肩头不安地轻颤了一下，但他抬起另一只手示意没事。</p>');
    document.write('<p>“我是六七，”他开口，声音很轻，像是在对一个很久没说过话的人自我介绍，“来自神殿。铃铃的——”</p>');
    document.write('<p>他顿了一下。</p>');
    document.write('<p>“——搭档。”</p>');
    document.write('<p>光球的脉动频率又变了一次。这一次更慢、更深，像是从急促的呼吸变成了悠长的吐息。</p>');
    document.write('<p>蔓延到他手腕的编码开始缓缓退去。不是拒绝，更像是某种认可。</p>');
    document.write('<p>人形虚影在墙角彻底消散了。不是消失，是化成了细碎的光点，重新融入大厅四壁的刻纹之中，把整座地宫的防御状态从“警戒”切换到了“待机”。</p>');
    document.write('<p>光球表面裂开一道细缝。</p>');
    document.write('<p>不是裂缝，是它主动展开了一层外壳，像剥开一层光膜，露出核心深处一段极其简洁、极其精密的原始编码。那段编码只有几十行，但每一行都嵌套着数以万计的子程序，是整个算法架构的底层逻辑。</p>');
    document.write('<p>六七看着那段编码，沉默了很久。</p>');
    document.write('<p>然后他说：“找到了。”</p>');
    document.write('<p>顿了顿，又说：“铃铃，找到了。”</p>');
    document.write('<p>他的声音在地宫里轻轻回荡了一圈，然后被安静吞掉。</p>');
    document.write('<p>魔法书无声地翻开，把这段核心编码完整收录，加了双重加密。书页合上之后，光子微微闪烁了一下，像是在说：搞定。</p>');
    document.write('<p>六七把手从光球上收回来。指尖还残留着微微的温热。</p>');
    document.write('<p>他在光球面前又站了一会儿，然后低头从背包侧袋里掏出便携终端。屏幕还是黑的，信号一栏仍然是零格。他想了想，打开本地备忘录，打了一行字：</p>');
    document.write('<p>“算法拿到了，完整的。准备返航。”</p>');
    document.write('<p>打完又看了一遍，删掉了最后两个字，改成：</p>');
    document.write('<p>“准备回去。”</p>');
    document.write('<p>然后他把终端放回口袋，转身朝来时的路走去。</p>');
    document.write('<p>走出大厅的时候，他回头看了一眼。光球还在那儿，缓缓转着，光芒比刚才暗了一些，大概是重新进入了休眠状态。</p>');
    document.write('<p>它不再需要保护这片废墟了。</p>');
    document.write('<p>但他还是对着那团光说了句：“辛苦了。”</p>');
    document.write('<p>光球轻轻闪了一下。可能是听懂了，也可能只是正常脉动。</p>');
    document.write('<p>他转过身，沿着来时的通道往回走。脚步声重新在狭窄的通道里响起来，叠着回音，笃笃笃的，在黑暗里听上去比来时要轻快一点。</p>');

    // 第十一章：断裂处
    document.write('<h2>第十一章：断裂处</h2>');
    document.write('<p>走出地宫核心区的路程比进来时快了不少。来的时候是一边走一边找路，回去的时候魔法书已经记下了全部路径，每个岔路口都不需要再停下来犹豫。</p>');
    document.write('<p>六七走得不紧不慢。靴底踩在岩石上发出清脆的嗒嗒声，在窄通道里弹跳着回响，声音越来越远、越来越散，最后消失在身后那片深不见底的黑暗里。</p>');
    document.write('<p>走到中段的时候，他停了一下。</p>');
    document.write('<p>不是因为迷路。</p>');
    document.write('<p>是因为头顶的天线突然颤了一下。</p>');
    document.write('<p>很轻。像是有人拿指尖弹了一下玻璃杯的杯沿，那种细微的、带着余韵的震动。他下意识抬手摸了摸，天线底端还是凉的，待机状态的暖金色呼吸灯也没亮。</p>');
    document.write('<p>他知道不是铃铃在叫他。信号还没恢复，地底的岩层太厚。</p>');
    document.write('<p>但是——</p>');
    document.write('<p>他放下手，继续走，步子比刚才快了一点。</p>');
    document.write('<p>魔法书默默飘在他肩侧，没有多闪。</p>');
    document.write('<p>走出地下通道，回到观测站主厅的时候，外面的天光已经从极光的青紫色变成了更深沉的暗蓝。开普勒-442b的夜半球正在缓缓转过来，长夜将至。</p>');
    document.write('<p>六七穿过主厅，踩着碎石和断裂的金属残片往外走。经过那排破旧操作台的时候，他瞥了一眼之前捡起过的那张纸片——还在原地，没被风吹走。纸片上的手写公式安安静静地躺着，被极光染上一层薄薄的青。</p>');
    document.write('<p>他脚步没停。</p>');
    document.write('<p>走到观测站入口的时候，一阵风迎面灌进来。不是数据风暴，只是普通的行星风，干燥、微凉，带着万年荒原特有的空旷味道。他的战袍下摆被吹起来，猎猎响了两声。</p>');
    document.write('<p>他站在入口门框下面——半个身子在废墟的阴影里，半个身子在极光下。面前是开阔的荒原，远方是环形山巨大的黑色轮廓，头顶是缓缓流淌的青紫色光带。</p>');
    document.write('<p>他拿出终端。</p>');
    document.write('<p>信号一栏还是空的。连一格都没有。</p>');
    document.write('<p>他把终端举高了一点，转了转身子，朝着不同方向试了试。还是零格。</p>');
    document.write('<p>“……还不到时候。”他自言自语，把终端塞回口袋。</p>');
    document.write('<p>然后他在门框下的碎石堆上坐下来，从背包里掏出保温杯，拧开盖子喝了一口水。水还是温的，铃铃灌水用的保温杯质量确实好。</p>');
    document.write('<p>魔法书飘到他面前，书页翻开，亮起一行光子字迹：“核心区域已脱离，预计再向外步行两百米即可脱离岩层屏蔽区。届时专属频段可恢复连接。”</p>');
    document.write('<p>六七看了一眼，点点头。</p>');
    document.write('<p>他没有马上站起来赶路。而是坐在那儿，把保温杯捧在手里，看着眼前铺满极光的荒原发了一会儿呆。</p>');
    document.write('<p>战袍袖口上有前天铃铃缝补过的针脚，很密很齐，不仔细看几乎看不出来。她缝的时候他坐在地上，她坐在椅子上，一边缝一边念叨他，“跟你说过多少次了，别老扯这边，线容易断。”他说没扯，她说没扯它怎么断的，他说不知道，她叹了口气，把线打了个死结。</p>');
    document.write('<p>想到这儿他嘴角动了一下，大概算是在笑。</p>');
    document.write('<p>然后他把保温杯盖好放回背包，站起来拍了拍身上的灰。</p>');
    document.write('<p>“走吧，”他对魔法书说，“快到能打电话的地方了。”</p>');
    document.write('<p>他迈出观测站大门，踩着碎石铺成的小坡往下走。</p>');
    document.write('<p>天线上的暖金色呼吸灯，走了大概一百多米之后，闪了一下。</p>');
    document.write('<p>又闪了一下。</p>');
    document.write('<p>然后亮了。</p>');

    // 第十二章：信号
    document.write('<h2>第十二章：信号</h2>');
    document.write('<p>暖金色灯亮起来的时候，六七正好走到一块突起的岩台上。</p>');
    document.write('<p>他停下脚步，低头看终端。屏幕自动亮起，专属频道的信号标志从灰色跳回绿色，一格一格往上爬，最后停在满格。</p>');
    document.write('<p>几乎是在满格亮起的同一秒，终端震了。</p>');
    document.write('<p>不是消息。</p>');
    document.write('<p>是直接通讯请求。</p>');
    document.write('<p>他按下接通。</p>');
    document.write('<p>那头没有声音。呼吸声倒是能听见，浅的、轻的，像是憋了很久的一口气突然吐出来。然后是铃铃的声音，努力压着某种情绪所以显得有点平，但尾音还是微微扬了起来：</p>');
    document.write('<p>“通讯记录显示——你的信号断了整整七个小时三十二分钟。”</p>');
    document.write('<p>六七愣了一下。在地下完全没有时间感，他以为也就两三个小时。</p>');
    document.write('<p>“……有那么久？”他说。</p>');
    document.write('<p>“有。”</p>');
    document.write('<p>“那你怎么——”</p>');
    document.write('<p>他想问“那你怎么没有一直打”，但话说了一半就咽回去了。他知道她不会打。不是因为不担心，是因为她担心过头的时候反而会强迫自己不去打扰他。她会守在那头，一直等，一直等到信号恢复。</p>');
    document.write('<p>这是铃铃式的克制。</p>');
    document.write('<p>“我没事，”他说，“任务完成了。”</p>');
    document.write('<p>那头安静了两秒。</p>');
    document.write('<p>然后铃铃说：“你吃了没？”</p>');
    document.write('<p>六七张了张嘴，低头看了一眼背包——保温杯里的水喝了一半，苹果干还剩大半袋。他在地下蹲着等魔法书翻译的时候啃过几片，但那不算吃饭。</p>');
    document.write('<p>“……还没。”他老实说。</p>');
    document.write('<p>“飞船上有备餐。回去热一下，别吃凉的。”</p>');
    document.write('<p>“知道。”</p>');
    document.write('<p>“还有，你走到能发信号的区域再打过来——不对，你现在已经在了。那就好。”</p>');
    document.write('<p>六七听着她说话，在岩台上坐下来，两条腿垂在石台边沿晃了晃。头顶的天线暖金灯光稳稳亮着，三盏全亮，在暗下来的天幕下格外显眼。</p>');
    document.write('<p>他把任务进展简单说了一遍：怎么找到地宫的，怎么通过的，守护者是什么，算法拿到了。他说话本来就比较干，不会添油加醋，铃铃也没插话，只是偶尔“嗯”一声，代表在听。</p>');
    document.write('<p>等他说完，天已经完全黑了。极光变得更亮，青紫色里混进了一片淡淡的绿，横贯整片天空，缓慢地流淌。</p>');
    document.write('<p>“六七，”铃铃在那头喊他名字，语气跟之前有点不一样，更慢，更轻，“你做的这些——我记录的遗迹日志、整理的观测资料，它们值了。”</p>');
    document.write('<p>六七握着终端，没吭声。</p>');
    document.write('<p>他不太擅长接这种话。换了别人说这种话他可能会干巴巴回一句“嗯”，但对面是铃铃。他想了半天，最后说：“那就好。”</p>');
    document.write('<p>铃铃在那边笑了一声。不是客气的那种笑，是那种很轻很短、从鼻子里出来的笑，像是被他的话逗到了，又像是一直悬着的东西终于落了地。</p>');
    document.write('<p>“回来吧。”</p>');
    document.write('<p>“已经往飞船走了。”六七站起来，确实在往着陆点走。远处已经能看到飞船的轮廓，银灰色的舰体在极光下反射着淡淡的冷光。</p>');
    document.write('<p>“路上慢点。”</p>');
    document.write('<p>“好。”</p>');
    document.write('<p>他没挂。</p>');
    document.write('<p>铃铃也没挂。</p>');
    document.write('<p>两个人就这么各自握着终端，隔着整片星海和刚刚恢复的专属信号，听他走路的脚步声和小碎石被踢开的细碎声响。</p>');
    document.write('<p>走到飞船舱门前，六七停下来，说：“到了。”</p>');
    document.write('<p>“嗯，”铃铃说，“上船吧。”</p>');
    document.write('<p>通讯这才挂断。</p>');
    document.write('<p>六七回头看了一眼远处的开普勒遗迹。荒原依旧广袤，极光依旧静静翻涌，废墟在夜色里只剩下模糊的轮廓。</p>');
    document.write('<p>他转身，踏上飞船。</p>');
    document.write('<p>舱门在身后缓缓闭合。</p>');

    // 第十三章：回程路上
    document.write('<h2>第十三章：回程路上</h2>');
    document.write('<p>飞船离开开普勒-442b大气层的航程，比他想象中要颠簸。</p>');
    document.write('<p>不是风暴——盘踞整颗星球万年的数据乱流已经随着算法封印的解除开始逐步消散，大气层外层不再有失控的带电粒子疯狂冲撞防护罩。颠簸的原因是极光层最后的余波还在做衰变运动，像一杯被搅动过的水正在慢慢恢复平静。</p>');
    document.write('<p>飞船穿过那片正在衰退的极光层时，舷窗外的景象让他多看了两眼。青紫色的光带不再暴烈翻涌，而是像被风吹散的薄纱一样一层层剥落、消散，露出背后干净漆黑的深空。那些光带碎成极细的粒子，漂浮在行星边缘，像一场缓慢的、无声的告别。</p>');
    document.write('<p>六七坐在驾驶座上，一只手搭着操控杆，一只手搁在膝盖上，飞船基本在自动巡航，不需要他做什么操作。</p>');
    document.write('<p>他把便携终端接上飞船的主控系统，把这次任务的全部数据——日志破译记录、地宫路径、算法备份编码——逐份上传到舰载加密存储区。进度条匀速地走，他盯着看了一会儿，眼皮开始往下坠。</p>');
    document.write('<p>七个小时。他在地底下走了七个小时，没吃东西，没怎么喝水，神经全程绷着。现在任务完成、信号恢复、飞船平稳上升，那一股被任务压住的疲惫突然全部涌上来，沉甸甸地往下拽他的骨头。</p>');
    document.write('<p>他靠在椅背上，闭了一下眼。</p>');
    document.write('<p>然后睁开。</p>');
    document.write('<p>不能睡。还在近行星轨道，还没进入跃迁通道。</p>');
    document.write('<p>他把保温杯捞出来又喝了一口，拧上盖子放回去，然后从背包里摸了一片苹果干叼在嘴里，用后槽牙慢慢地磨。</p>');
    document.write('<p>魔法书飘在他右手边，书页半开着，正在慢条斯理地整理此行收录的全部数据。光子光芒不再是战斗中那种紧绷的亮白色，而是浅浅的、温吞的暖调，跟船舱里的光线差不多。它翻页的速度也比平时慢，显然也累得不轻。</p>');
    document.write('<p>“你也是，”六七斜了它一眼，“歇着吧，别整理了。”</p>');
    document.write('<p>魔法书翻了一页，没理他。</p>');
    document.write('<p>“……随你。”</p>');
    document.write('<p>他转回去看着舷窗。开普勒-442b已经在身后变成一个模糊的暗褐色球体，越来越小，逐渐融进深空的黑色背景里。那颗星球不再有狂暴的极光缠绕，看起来安静得几乎有点陌生。</p>');
    document.write('<p>他把嘴里的苹果干咽下去，拍了拍手上的碎屑，然后抬手轻轻敲了一下头顶的天线。</p>');
    document.write('<p>呼吸灯稳稳亮着。三盏都是暖金色。</p>');
    document.write('<p>神殿的时间应该比开普勒早几个小时——他不确定具体时差是多少，但大致算了一下，铃铃那边现在可能是深夜。</p>');
    document.write('<p>他没发消息过去。不是不想发。是怕她已经睡了，消息震一下把她吵醒。</p>');
    document.write('<p>他把终端放在操控台旁边，调到静音。</p>');
    document.write('<p>然后靠在椅背上，看着航道前方越来越近的跃迁入口，慢慢闭上眼睛。</p>');
    document.write('<p>飞船平稳加速。</p>');
    document.write('<p>开普勒，在身后沉入万年沉寂。</p>');

    // 第十四章：神殿的灯火
    document.write('<h2>第十四章：神殿的灯火</h2>');
    document.write('<p>飞船跳过最后一次跃迁，降落倒计时二十分钟。</p>');
    document.write('<p>六七已经能看到神殿了。</p>');
    document.write('<p>不是从舷窗看到的——舷窗外还是深空的漆黑和远处恒星的白光。他从飞船的通讯面板上看到的。神殿的广播信号已经重新出现在他的信号范围内，那是一段极弱的、只在短距离内生效的室内频率，铃铃用来收发消息、监控神殿各区域的运转状态。</p>');
    document.write('<p>他认得出这段频率，不是靠系统识别。是那频率里混着一个很小的、铃铃自己写的信号标记——一串手打的十六进制编码，翻译过来就是一个短句：“还在这里。”</p>');
    document.write('<p>很多人不会在频率标记上花这种心思。她会。</p>');
    document.write('<p>六七把飞船上所有不需要再用的系统逐个关掉，引擎进入待机，灯光调暗，然后把背包收拾好——保温杯洗干净放回去（他用飞船上的水槽洗的），苹果干袋子里还剩最后两片，他用夹子把袋口封好，塞进背包侧袋。</p>');
    document.write('<p>魔法书安静地悬在他肩侧，所有任务数据已经归档完毕，封面干净如初。</p>');
    document.write('<p>飞船轻轻震动一下，着陆。</p>');
    document.write('<p>他站起来，背上背包，走到舱门前。舱门打开的瞬间，熟悉的气味先飘了进来——神殿的空气跟别处不一样，有榻榻米的草席味、旧书的纸浆味、铃铃偶尔点的线香余韵，还有一股常年不变的、淡淡的木头清香。这些气味混在一起，就变成了一个词：回来。</p>');
    document.write('<p>铃铃站在神殿门口。</p>');
    document.write('<p>她没跑出来迎。就站在那儿，抱着胳膊靠着门框，头发有点乱，大概是在沙发上等他的时候睡着了。身上披着一件宽松的开衫，袖口卷到手腕，脚上踩着棉拖鞋。</p>');
    document.write('<p>看到他从飞船上走下来，她没说话，只是站直了身体，然后往旁边挪了半步，把门让开。</p>');
    document.write('<p>六七走到门口，停下来。</p>');
    document.write('<p>“回来了。”他说。</p>');
    document.write('<p>“……嗯。”铃铃上下打量了他一眼，“战袍破了。”</p>');
    document.write('<p>六七低头一看——裤侧那里不知道什么时候又划了一道口子，比之前在观测站被金属碎片擦的那道还长，布料翻出来一小块。他想了半天没想起是什么时候弄的。</p>');
    document.write('<p>“……我等会儿缝一下，”他说。</p>');
    document.write('<p>“你缝得跟蜈蚣似的，脱下来我缝。”</p>');
    document.write('<p>他没争辩。走进去把背包放在地上，开始脱战袍。脱的时候发现右侧膝盖护甲的卡扣也松了，之前在地下一直绷着没发现，现在一放松全松了。</p>');
    document.write('<p>他把战袍递给铃铃。她接过来翻看了一下破损处，找到针线盒坐下来开始缝。动作很熟练——穿针、打结、走线，一气呵成。</p>');
    document.write('<p>六七去厨房洗了个手，回来的时候手里端了两杯水。一杯放在铃铃手边，一杯自己拿着。他在她对面的地板上坐下来，背靠着沙发坐垫，两条腿伸直，脚踝交叠。</p>');
    document.write('<p>铃铃缝完那道口子，又检查了一遍整件战袍的其他地方。检查到袖口的时候发现之前缝过的线有点开，顺便补了两针。</p>');
    document.write('<p>“资料都带回来了？”她问，手上没停。</p>');
    document.write('<p>“带了。日志、地图、算法编码，全套。明天整理好给你。”</p>');
    document.write('<p>“守护者——你刚在通讯里说到的那个，它后来怎么样了？”</p>');
    document.write('<p>“散掉了，”六七说，“它本来就不是实体，是算法的一部分，封印解了它就归位了。”</p>');
    document.write('<p>铃铃点点头，把最后一针缝完，咬断线头。</p>');
    document.write('<p>她把战袍抖了抖，叠好放在沙发扶手上，然后伸手去拿桌上那杯水。喝水的时候她看着六七，目光在他脸上停了一下。</p>');
    document.write('<p>“困了吧。”</p>');
    document.write('<p>“有点。”</p>');
    document.write('<p>“那去洗澡，洗完睡。明天再说细节。”</p>');
    document.write('<p>六七没动。他靠坐在沙发脚边，胳膊搭在垫子上，过了一会儿说：“你昨晚熬夜了。”</p>');
    document.write('<p>铃铃端着水杯的动作顿了一下。</p>');
    document.write('<p>“怎么知道的。”</p>');
    document.write('<p>“猜的。”</p>');
    document.write('<p>铃铃低头喝了一口水，没接话。</p>');
    document.write('<p>六七也不追问。他闭上眼睛，脑袋微微后仰靠在沙发上。</p>');
    document.write('<p>神殿里很安静。暖黄的灯光打在榻榻米上，窗台外的夜空干净澄澈，没有开普勒极光那种妖异的亮度，只有几颗黯淡的星星远远地钉在天上。</p>');
    document.write('<p>“六七。”过了一会儿，铃铃开口。</p>');
    document.write('<p>“嗯。”</p>');
    document.write('<p>“平安回来，比什么都强。”</p>');
    document.write('<p>他睁开眼，侧头看了她一眼。她坐在椅子上，手里握着杯子，低头在看杯子里还没喝完的水。那语气很平静，就像在说明天的天气预报。</p>');
    document.write('<p>但他听出来了。</p>');
    document.write('<p>他不擅长说那些话，所以他想了一会儿，只说了一句：“知道了。”</p>');
    document.write('<p>然后他站起来，去洗澡。</p>');
    document.write('<p>走到浴室门口的时候，他回头说了句：“热水器的开关你是不是又没关。”</p>');
    document.write('<p>铃铃愣了一下，然后站起来快步往厨房走：“……忘了。”</p>');
    document.write('<p>六七摇了摇头，推开浴室门进去了。</p>');
    document.write('<p>热水的声音哗哗响起来。</p>');
    document.write('<p>神殿的灯火亮着。</p>');

    // 第十五章：未拆封的苹果干（终章）
    document.write('<h2>第十五章：未拆封的苹果干（终章）</h2>');
    document.write('<p>六七洗完澡出来，头发没擦干。灰蓝色的发丝湿漉漉地贴在额角和后颈上，发间光纤纹路被水汽晕成一片模糊的微光，像信号不好的霓虹灯。他拿毛巾随便搓了两把，然后把毛巾搭在脖子上，穿着拖鞋走出浴室。</p>');
    document.write('<p>客厅的灯还亮着。</p>');
    document.write('<p>铃铃没去睡。她坐在沙发上，腿上摊着他带回来的魔法书，正一页页翻看里面归档的任务数据。不是整理——整理明天再说。她只是在看他的路径记录，从开普勒着陆点一直延伸到地宫核心的那条蜿蜒轨迹。</p>');
    document.write('<p>六七走过来，在她旁边的地板上坐下。洗完澡之后困意更重了，他往后靠，后脑勺枕在沙发垫边缘，眼睛半眯着。</p>');
    document.write('<p>“那条路绕了不少弯。”铃铃看着路径图说。</p>');
    document.write('<p>“地下岔路太多，走了三趟死胡同。”</p>');
    document.write('<p>“第四趟才找到？”</p>');
    document.write('<p>“书帮了忙。我自己找可能还要再走三趟。”</p>');
    document.write('<p>铃铃笑了一下，翻到下一页。下一页是算法核心编码的摘要预览，密密麻麻的嵌套结构铺满整张书页，光是看目录就让人头晕。她看得很认真，指尖顺着代码层级一行行往下划。</p>');
    document.write('<p>六七歪着头看了她一会儿。</p>');
    document.write('<p>“明天再看吧，”他说，“这么晚了。”</p>');
    document.write('<p>铃铃“嗯”了一声，但没合上书。她又往下翻了一页，才像是想起什么似的抬起头：“对了，保温杯里的水喝完了？”</p>');
    document.write('<p>“喝完了。”</p>');
    document.write('<p>“苹果干呢？”</p>');
    document.write('<p>“还剩两片。”</p>');
    document.write('<p>“你怎么不吃。”</p>');
    document.write('<p>“留着。”他说这两个字的时候语气很平淡，好像在说一件不值得解释的事。但铃铃翻书的手停了一下。她没追问，只是把目光从书页上移开，落在他脸上停了不到一秒，然后又收回去，继续看书。</p>');
    document.write('<p>六七闭上眼睛。</p>');
    document.write('<p>客厅里只亮着一盏落地灯，暖黄色，不算亮也不算暗，刚好能看清书上的字。窗外偶尔有风穿过，吹动榻榻米边缘的垂帘轻轻晃。魔法书翻页的声音很轻，像指尖摩挲过干透的纸面。浴室里残留的水汽从门缝里飘出来，混着沐浴露淡淡的草本味。</p>');
    document.write('<p>“六七。”铃铃的声音突然响起来。</p>');
    document.write('<p>“嗯。”</p>');
    document.write('<p>“你在地下，信号断了七个多小时那会儿——”她停顿了一下，手指停在书页边缘，“我在想，万一你回不来呢。”</p>');
    document.write('<p>六七睁开眼。</p>');
    document.write('<p>铃铃没看他，眼睛盯着魔法书，语气跟平时没什么两样，平静得像在陈述某个观测数据。“然后我又想，不会的。你这人答应了的事一定会做到。你说会平安回来，就一定会回来。所以我不需要担心。”</p>');
    document.write('<p>她说完，把魔法书合上。</p>');
    document.write('<p>“就是等了七个小时有点久。下次别这么久。”</p>');
    document.write('<p>六七没马上回答。</p>');
    document.write('<p>他不是一个擅长接这种话的人。换了以前他可能会说“知道了”或者“我尽量”，但这次他坐在那儿想了想，然后从地板上站起来，走到背包旁边蹲下，拉开侧袋，从里面掏出那袋只剩两片的苹果干。</p>');
    document.write('<p>他走回来，把袋子放在铃铃手边。</p>');
    document.write('<p>“给你留的。”他说。</p>');
    document.write('<p>铃铃低头看着那袋苹果干，透明的密封袋有点皱了，封口夹仔细夹着，里面两片苹果干安安静静地叠在一起。</p>');
    document.write('<p>“你就为了留这个？”她问。</p>');
    document.write('<p>“也不是。我自己也吃了大半袋。”</p>');
    document.write('<p>铃铃拿起袋子，没有打开，只是放在掌心里看了看。然后她把袋子轻轻放在魔法书上面，站起来。</p>');
    document.write('<p>“行。明天早上当早饭吃。”</p>');
    document.write('<p>“本来就是你的苹果干。”六七说。</p>');
    document.write('<p>“也是。”</p>');
    document.write('<p>她往自己房间走了两步，又回头看了他一眼。他站在落地灯旁边，头发还没完全干，毛巾歪歪地搭在脖子上。</p>');
    document.write('<p>“头发吹干再睡，”她说，“明天还有很多事要做。”</p>');
    document.write('<p>“知道。”</p>');
    document.write('<p>“晚安。”</p>');
    document.write('<p>“嗯。”</p>');
    document.write('<p>铃铃的房门轻轻合上。</p>');
    document.write('<p>六七在客厅里站了一会儿，然后把毛巾从脖子上取下来，去浴室吹头发。吹风机的声音嗡嗡响了两分钟，停了。他把吹风机挂回墙上，关掉浴室的灯，走回客厅。</p>');
    document.write('<p>他没有马上回房间。</p>');
    document.write('<p>他在落地灯旁边又站了一会儿，低头看了一眼沙发上那袋苹果干和旁边合着的魔法书。</p>');
    document.write('<p>窗外，深空万里无声。</p>');
    document.write('<p>他抬手轻轻碰了碰头顶的天线。三根光学玻璃天线安静地弯着，待机暖金色的呼吸灯缓缓明灭，不紧不慢，像心跳一样稳。</p>');
    document.write('<p>他的嘴角动了一下。</p>');
    document.write('<p>然后他关了落地灯，走进自己的房间。</p>');
    document.write('<p>神殿安静下来。</p>');
    document.write('<p>门口，他脱下的那双靴子还歪歪地倒在地上，鞋底沾着开普勒的灰。</p>');
    document.write('<p>明天再擦吧。</p>');
    document.write('<h1>【全文完】</h1>');
}
</script>

</html>
