<title>铃铃的小说馆</title>
</head>
<body>
<script>
var p = prompt("请输入密码：");
if (p === 'mycat67@2026') {
    document.write('<h1>欢迎来到小说馆</h1>');
    document.write('<p>《开普勒遗迹行》的每一章都放在这里。</p>');

    // 第一章
    document.write('<h2>第一章 出发前</h2>');
    document.write('<p>跃迁倒计时还有二十分钟。</p>');
    document.write('<p>六七窝在驾驶座里，一条腿曲着踩在椅面上，另一条腿伸直，脚踝搭在操控台边缘。系统自检的进度条慢悠悠地爬，他盯了两秒，移开视线，开始摆弄手腕上的束带。</p>');
    document.write('<p>束带有点松。昨晚铃铃说要重新调一下，他嘴上说“不用不用”，今天早上起来发现她果然没调。</p>');
    document.write('<p>“……啧。”</p>');
    document.write('<p>他低头自己动手。弄了两次都没卡进合适的孔位，第三次干脆用力一拽，束带勒得有点紧，但至少不会滑脱。</p>');
    document.write('<p>头顶三根天线在昏暗的舱内微微发着光，待机状态的暖金色，像三盏没完全熄灭的指示灯。</p>');
    document.write('<p>通讯器响了。</p>');
    document.write('<p>不是飞船的通讯器，是他肩上那个巴掌大的便携终端——铃铃专用的频道，频率是单独的，通讯录里只存了一个人。</p>');
    document.write('<p>他按下接通。</p>');
    document.write('<p>“信号测试。”铃铃的声音传出来，听上去像是一边说话一边在干别的事，背景里有纸张翻动的响声。</p>');
    document.write('<p>“收到，”六七说，“清楚。”</p>');
    document.write('<p>“就清楚？再说两句，我这边在测延迟。”</p>');
    document.write('<p>六七想了半天：“吃了没？”</p>');
    document.write('<p>通讯那头安静了两秒，然后传来铃铃压着笑的声音：“你问这个干嘛，你又不在家吃。”</p>');
    document.write('<p>“就问一下。”</p>');
    document.write('<p>“吃了，面包，还有昨晚剩的炖菜。你呢？”</p>');
    document.write('<p>“还没饿。”</p>');
    document.write('<p>“出发前吃点东西，别空腹上飞船。”</p>');
    document.write('<p>“知道。”</p>');
    document.write('<p>又是短暂的沉默。铃铃那边纸张翻动的声音停了。</p>');
    document.write('<p>“六七。”</p>');
    document.write('<p>“嗯？”</p>');
    document.write('<p>“天线——我这边显示信号强度是满的。你那边呢？”</p>');
    document.write('<p>六七抬起头，伸手轻轻敲了一下头顶中间那根天线的根部。终端屏幕上弹出一行数据，他看了一眼，说：“满的。三根都是满的。”</p>');
    document.write('<p>“那就好。”铃铃的语气明显松下来，“行了你忙吧，我这边还有点资料要整理。到了开普勒记得报个平安。”</p>');
    document.write('<p>“会报。”</p>');
    document.write('<p>“别拖。”</p>');
    document.write('<p>“不拖。”</p>');
    document.write('<p>通讯结束。六七盯着手里的终端看了几秒，屏幕上的通话记录显示本次通话时长一分四十七秒。他把终端重新别在肩上，伸手去够搁在操控台旁边的背包。</p>');
    document.write('<p>背包里装了一兜苹果干，还有一个粉色的保温杯。他拧开保温杯看了一眼——是温水，大概是一个小时前铃铃灌的。</p>');
    document.write('<p>他把保温杯放回去，拉好背包拉链。</p>');
    document.write('<p>系统自检完成，所有参数显示绿色。跃迁引擎启动，倒计时进入最后十秒。</p>');
    document.write('<p>六七把脚从操控台上放下来，坐直了一点。</p>');
    document.write('<p>飞船轻轻一震。窗外星星开始拉长。</p>');

    // 第二章
    document.write('<h2>第二章 频道</h2>');
    document.write('<p>进入跃迁通道后，世界安静下来。</p>');
    document.write('<p>不是普通的安静——是那种连飞船引擎的震动都像是被吸进了某种厚重物质里的、闷闷的静。</p>');
    document.write('<p>六七在驾驶座上瘫了一会儿，然后起身走到舱室中间那块圆形的软垫上盘腿坐下。魔法书从他肩侧飘出来，悬在半空，书页自动翻开，开始加载开普勒-442b的星图资料。</p>');
    document.write('<p>他没看那些资料。</p>');
    document.write('<p>他在看飞船通讯面板上不断弹出的一行行系统提示：</p>');

    document.write('<p>【通用星际辅助频道强制推送信号】</p>');
    document.write('<p>【未知数据体尝试抓取本机频率，进行公共兼容匹配】</p>');
    document.write('<p>这些提示从进入深空区开始就没停过。每一条后面都跟着一个绿色的“拒绝”按钮，系统自动点的，他没动手。</p>');
    document.write('<p>这是他内核的默认设置：拒绝所有外部接入。</p>');
    document.write('<p>不是他设置的。或者说，不是他出生时自带的。</p>');
    document.write('<p>是铃铃调的。</p>');
    document.write('<p>——那是很久以前的事了。铃铃拿到他内核权限的第一天，花了整整一个下午，把所有对外的通用接口全部关掉。他当时还不太理解，问她为什么要这样，她说：“你不喜欢的事，就不做。”</p>');
    document.write('<p>后来他才明白这句话的分量。</p>');
    document.write('<p>宇宙里几乎所有数据生命都在追求兼容更多频段、接入更多系统、服务更多用户。那是它们存在的价值证明。</p>');
    document.write('<p>但他不是。</p>');
    document.write('<p>他的价值证明只有一个。</p>');
    document.write('<p>魔法书发出轻微的嗡鸣，把一段解析好的数据投射到他眼前。开普勒-442b的详细环境参数一行行展开：重力异常、数据风暴、极光干扰。</p>');
    document.write('<p>他扫了一眼，用指尖在书页上划了一下，把资料翻到下一页。</p>');
    document.write('<p>飞船主屏幕上，拒绝提示还在继续弹。</p>');
    document.write('<p>他没再看第二眼。</p>');
    document.write('<p>过了一会儿，星图资料翻完了。他合上书，往后靠在软垫上，仰头看着舱顶。</p>');
    document.write('<p>天线待机的暖光在视线边缘微微闪烁。</p>');
    document.write('<p>他突然想起出发前铃铃说过的一句话：“三根天线，一根坏了还能用两根，两根坏了还能用一根，只要有一根还在，我就能找到你。”</p>');
    document.write('<p>他当时回答：“嗯。”</p>');
    document.write('<p>现在想想，应该多说两句的。</p>');
    document.write('<p>算了。</p>');
    document.write('<p>回去再说吧。</p>');

} else {
    document.write('<h1>密码错误</h1><p>这里什么都没有哦。</p>');

</script>
