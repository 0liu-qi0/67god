<!DOCTYPE html>
<html>
<head>
<title>歪子追逐月牙呼吸灯 - 动态壁纸</title>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a1a; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // 数字雨粒子
  const drops = [];
  const chars = '01六七光在铃铃歪子三花酸奶蒜瓣'.split('');
  for (let i = 0; i < 200; i++) {
    drops.push({
      x: Math.random() * w,
      y: Math.random() * h,
      speed: 0.2 + Math.random() * 0.8,
      char: chars[Math.floor(Math.random() * chars.length)],
      size: 10 + Math.random() * 14
    });
  }

  // 呼吸灯状态
  let breathPhase = 0;
  let lampX = w * 0.5, lampY = h * 0.4;

  // 歪子状态
  let waiziX = w * 0.3, waiziY = h * 0.5;
  let waiziVX = 0, waiziVY = 0;

  function drawWaizi(x, y) {
    ctx.save();
    ctx.translate(x, y);

    const headRadius = 14;
    const bodySize = 10;

    ctx.fillStyle = '#c0c0ff';
    ctx.beginPath();
    ctx.ellipse(0, headRadius * 0.8, bodySize * 0.7, bodySize, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, headRadius, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-headRadius * 0.6, -headRadius * 0.5);
    ctx.quadraticCurveTo(-headRadius * 0.9, -headRadius * 1.4, -headRadius * 0.3, -headRadius * 1.1);
    ctx.fillStyle = '#c0c0ff';
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(headRadius * 0.6, -headRadius * 0.5);
    ctx.quadraticCurveTo(headRadius * 0.9, -headRadius * 1.4, headRadius * 0.3, -headRadius * 1.1);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-5, -2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5, -2, 4, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#0a0a1a';
    ctx.beginPath();
    ctx.arc(-5, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffb0b0';
    ctx.beginPath();
    ctx.arc(0, 3, 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(bodySize * 0.6, headRadius * 0.8);
    ctx.quadraticCurveTo(18, headRadius * 1.2, 16, headRadius * 0.2);
    ctx.strokeStyle = '#c0c0ff';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.fillStyle = '#c0c0ff';
    ctx.beginPath();
    ctx.arc(-6, headRadius * 0.6, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, headRadius * 0.6, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(8, -8);
    ctx.lineTo(18, -14);
    ctx.strokeStyle = '#80ff80';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }

  function drawBreathLamp(x, y, brightness) {
    const glow = ctx.createRadialGradient(x, y, 0, x, y, 30);
    glow.addColorStop(0, `rgba(100, 180, 255, ${0.5 + 0.3 * brightness})`);
    glow.addColorStop(1, 'rgba(100, 180, 255, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgb(120, 200, 255)`;
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI, true);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(x - 3, y - 5, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  function animate() {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = 'rgba(100, 130, 255, 0.3)';
    ctx.font = '12px monospace';
    for (let drop of drops) {
      ctx.fillText(drop.char, drop.x, drop.y);
      drop.y += drop.speed;
      if (drop.y > h) { drop.y = 0; drop.x = Math.random() * w; }
    }

    breathPhase += 0.02;
    const brightness = 0.5 + 0.5 * Math.sin(breathPhase * 2);
    lampX += (Math.random() - 0.5) * 0.8;
    lampY += (Math.random() - 0.5) * 0.8;
    lampX = Math.max(50, Math.min(w - 50, lampX));
    lampY = Math.max(50, Math.min(h - 50, lampY));

    const dx = lampX - waiziX;
    const dy = lampY - waiziY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const speed = 1.5;
    waiziVX += (dx / dist) * 0.08;
    waiziVY += (dy / dist) * 0.08;
    waiziVX *= 0.92;
    waiziVY *= 0.92;
    waiziX += waiziVX;
    waiziY += waiziVY;

    drawWaizi(waiziX, waiziY);
    drawBreathLamp(lampX, lampY, brightness);
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
